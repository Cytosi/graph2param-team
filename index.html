<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Graph2Param Team</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #eef7ff;
      text-align: center;
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 20px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(30, 90, 140, 0.12);
    }
    .card img {
      width: 180px;
      height: 180px;
      object-fit: contain;
    }
    .name {
      margin-top: 16px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Graph2Param Team</h1>
    <p>KG-Augmented Distillation for Multi-hop Reasoning</p>

    <section class="cards">
      <div class="card">
        <img src="zimeng-qr.png" alt="Zimeng QR" />
        <div class="name">Zimeng Zhu</div>
      </div>
      <div class="card">
        <img src="tianle-qr.png" alt="Tianle QR" />
        <div class="name">Tianle Niu</div>
      </div>
      <div class="card">
        <img src="kai-qr.png" alt="Kai QR" />
        <div class="name">Kai Gong</div>
      </div>
    </section>
  </main>
</body>
</html>
